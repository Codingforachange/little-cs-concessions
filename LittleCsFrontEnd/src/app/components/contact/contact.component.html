<section id="contact" class="py-5 bg-light">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8 text-center mb-5">
        <h2 class="display-4 fw-bold" style="color: var(--concession-navy);">BOOK THE TRUCK</h2>
        <p class="lead">Planning an event? Let us bring the funnel cakes to you!</p>
      </div>
      
      <div class="col-lg-6 shadow p-4 bg-white rounded-4">
        <form [formGroup] ="contactForm" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label fw-bold">Name</label>
            <input type="text" formControlName="name" class="form-control" placeholder="Your Name">
          </div>
          
          <div class="mb-3">
            <label class="form-label fw-bold">Email</label>
            <input type="email" formControlName="email" class="form-control" placeholder="email@example.com">
          </div>
          
          <div class="mb-3">
            <label class="form-label fw-bold">Event Type</label>
            <select formControlName="eventType" class="form-select">
              <option>Birthday Party</option>
              <option>Festival / Fair</option>
              <option>Corporate Event</option>
              <option>Fundraiser</option>
              <option>Other</option>
            </select>
          </div>
          
          <div class="mb-3">
            <label class="form-label fw-bold">Message</label>
            <textarea formControlName="message" class="form-control" rows="4" placeholder="Tell us about your event..."></textarea>
          </div>
          
          <button type="submit" [disabled]="contactForm.invalid" 
                  class="btn btn-lg w-100 fw-bold shadow-sm" 
                  style="background-color: var(--concession-red); color: white;">
            SEND REQUEST
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
