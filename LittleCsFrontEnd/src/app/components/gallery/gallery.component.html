<section id="gallery" class="py-5 bg-white">
  <div class="container">
    <div class="text-center mb-5">
      <h2 class="display-4 fw-bold" style="color: var(--concession-navy);">PHOTO GALLERY</h2>
      <p class="text-muted">A look at our favorite events and community smiles.</p>
      <div class="underline mx-auto" style="height: 4px; width: 60px; background-color: var(--concession-yellow);"></div>
    </div>

    <div class="row g-3">
      <div class="col-6 col-md-4 col-lg-3" *ngFor="let photo of photos">
        <div class="gallery-item shadow-sm rounded overflow-hidden">
          <img [src]="photo.url" class="img-fluid gallery-img" [alt]="photo.caption">
        </div>
      </div>
      
      <div *ngIf="photos.length === 0" class="col-12 text-center py-5 border rounded-4 border-dashed">
        <i class="bi bi-images fs-1 text-muted"></i>
        <p class="mt-2 text-muted">No photos uploaded yet. Gallery management coming soon!</p>
      </div>
    </div>
  </div>
</section>
