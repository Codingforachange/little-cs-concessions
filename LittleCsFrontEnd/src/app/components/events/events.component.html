<section id="events" class="py-5 bg-dark text-white">
  <div class="container">
    <h2 class="text-center fw-bold mb-5" style="color: var(--concession-yellow);">UPCOMING EVENTS</h2>
    
    <div class="row justify-content-center">
      <div *ngFor="let event of events" class="col-md-8 mb-3">
        <div class="card bg-white text-dark rounded-4 shadow-sm overflow-hidden">
          <div class="row g-0 align-items-center">
            <div class="col-2 bg-concession-red text-white text-center py-3" style="background-color: #c41230;">
              <h3 class="fw-bold mb-0">{{ event.day }}</h3>
              <small class="text-uppercase">{{ event.month }}</small>
            </div>
            <div class="col-7 p-3">
              <h5 class="fw-bold mb-1">{{ event.title }}</h5>
              <p class="mb-0 text-muted small">{{ event.startTime }} | {{ event.location }}</p>
            </div>
            <div class="col-3 text-center">
              <a [href]="'https://www.google.com/maps/search/?api=1&query=' + event.address" 
                 target="_blank" 
                 class="btn btn-outline-danger btn-sm rounded-pill">
                 DIRECTIONS
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
