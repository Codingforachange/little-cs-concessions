<section id="menu" class="py-5 bg-light">
    <div class="ccontainer">
        <div class="text-center mb-5">
            <h2 class="display-4 fw-bold" style="color: var(--concession-navy);">OUR MENU</h2>
            <div class="underline mx-auto" style="height: 4px; width: 60px; background-color: var(--concession-red);"></div>
        </div>
        <div class="row g-4">
            <div class="col-md-4" *ngFor="let item of menuItems">
                <div class="card h-100 border-0 shadow-sm">
                    <img [src]="item.image" class="card-img-top" [alt]="item.name" style="height: 250px; object-fit: cover;">
                    <div class="card-body text-center">
                        <h5 class="card-title fw-bold">{{ item.name}}</h5>
                        <p class="card-text text-muted">{{ item.description }}</p>
                        <div class="fs-4 fw-bold" style="color: var(--concession-red);">${{ item.price.toFixed(2) }}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</section>
