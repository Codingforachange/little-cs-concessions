<section id="location" class="py-5 bg-light">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-lg-4 mb-4 mb-lg-0">
        <h6 class="text-uppercase fw-bold text-danger mb-2">Find the Truck</h6>
        <h2 class="display-6 fw-bold mb-4" style="color: var(--concession-navy);">Current Location</h2>
        <div class="card border-0 shadow-sm p-4 rounded-4">
          <div class="d-flex align-items-center mb-3">
            <i class="bi bi-geo-alt-fill fs-2 me-3" style="color: var(--concession-red);"></i>
            <div>
              <h5 class="mb-0 fw-bold">{{ currentLocation }}</h5>
              <p class="text-muted mb-0">Catch us here today!</p>
            </div>
          </div>
          <p class="small text-muted">Note: Locations change daily for events and festivals. Check our <a href="#events" class="text-danger">Schedule</a> for upcoming stops.</p>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="map-container shadow rounded-4 overflow-hidden" style="height: 400px;">
          <iframe 
            [src]="mapUrl" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy">
          </iframe>
        </div>
      </div>
    </div>
  </div>
</section>
